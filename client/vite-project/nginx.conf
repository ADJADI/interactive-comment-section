server {
    listen 80;

    # Sert les fichiers statiques générés par Vite
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy : les requêtes /graphql sont transmises au service "server"
    # "server" est le nom du service dans docker-compose -> Docker résout le DNS automatiquement
    location /graphql {
        proxy_pass http://server:4000/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
