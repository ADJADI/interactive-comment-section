name: Build, push & deploy

on:
  push:
    branches: ["master"]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      server_image: ${{ steps.vars.outputs.server_image }}
      client_image: ${{ steps.vars.outputs.client_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute lowercase image names
        id: vars
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "server_image=${{ env.REGISTRY }}/${REPO_LC}-server:latest" >> "$GITHUB_OUTPUT"
          echo "client_image=${{ env.REGISTRY }}/${REPO_LC}-client:latest" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: server/graphql/graphql-server
          push: true
          tags: ${{ steps.vars.outputs.server_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client image
        uses: docker/build-push-action@v6
        with:
          context: client/vite-project
          push: true
          build-args: |
            VITE_GRAPHQL_URI=/graphql
          tags: ${{ steps.vars.outputs.client_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: http://${{ vars.VPS_HOST }}:8080
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker/docker-compose.prod.yml"
          target: "~/interactive-comment-section"
          strip_components: 1

      - name: Pull & restart containers on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/interactive-comment-section
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export SERVER_IMAGE=${{ needs.build-and-push.outputs.server_image }}
            export CLIENT_IMAGE=${{ needs.build-and-push.outputs.client_image }}
            export MONGO_DB=interactive_comments
            export CORS_ORIGIN=http://${{ secrets.VPS_HOST }}:8080
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
