name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master"]

jobs:
  lint-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install
        working-directory: client/vite-project
      - run: npm run lint
        working-directory: client/vite-project

  build-images:
    runs-on: ubuntu-latest
    needs: lint-client
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: server/graphql/graphql-server
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: client/vite-project
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
