# Compose de production : utilise les images déjà construites et poussées sur GHCR
# par le pipeline CI/CD (voir .github/workflows/deploy.yml), au lieu de les
# reconstruire sur le VPS.

services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: ${SERVER_IMAGE}
    container_name: server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB:-interactive_comments}
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN}

  client:
    image: ${CLIENT_IMAGE}
    container_name: client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  mongo-data:
